<form id="create-product" class="vendor-table container">
    <h2>Create Product</h2>
    <!-- Name, Desc, Price -->
    <div class="row">
        <div class="col">
            <label for="name">Product Name</label>
            <input type="text" name="name" placeholder="Input here">
        </div>
        <div class="col">
            <label for="desc">Description</label>
            <textarea class="form-control" cols="64" id="desc" 
                maxlength="1224" name="desc" placeholder="Description" 
                rows="8">
            </textarea>
        </div>
        <div class="col">
            <label for="price">Price</label>
            <input type="text" name="price" placeholder="Input here">
        </div>
    </div>
    <hr>
    <!-- Categories -->
    <div class="row">
        <div class="col-12 flex">
            <button onclick="addElem(categoryElem, categoryHTML)" class="btn vendor-btn" type="button">Add category</button>
        </div>
        <div class="flex flex-wrap col">
            <label for="category" class="">Categories</label>
            <div id="vendor-categories">
                <select class="vendor-category-input" 
                    name="category" placeholder="Input category">
                    <option for="category" value="">Soil</option>
                    <option for="category" value="">Fertilizer</option>
                </select>
            </div>
            <!-- div (the above div needs to be there or else there will be a whitespace) -->
        </div>
    </div>
    <hr>
    <!-- Specifications -->
    <div class="row">
        <div class="col-12 flex">
            <button onclick="addElem(specElem, specHTML)" class="btn vendor-btn" type="button">
                Add Specification</button>
        </div>
        <div class="col-12">
            <span>Note: Empty specifications will be ignored</span>
        </div>
        <div id="vendor-specs" class="col">
            <label for="spec">Specifications</label>
            <input type="text" name="spec" placeholder="Input here">
        </div>
    </div>
    <hr>
    <!-- Colors -->
    <div class="row">
        <div class="col-12 flex">
            <button onclick="addElem(colorElem, colorHTML)" class="btn vendor-btn" type="button">Add Color</button>
        </div>
        <div class="col-12">
            <span>Note: Empty colors will be ignored</span>
        </div>
        <div class="flex flex-wrap col">
            <label for="color" class="">Colors</label>
            <div id="vendor-colors">
                <input type="text" class="vendor-color-input" name="color" placeholder="Input color like #FFB0FF"></div>
            <!-- div (the above div needs to be there or else there will be a whitespace) -->
        </div>
    </div>
    <hr>
    <!-- Images -->
    <div class="row">
        <div class="col-12 flex">
            <button onclick="addElem(imageElem, imageHTML)" class="btn vendor-btn" type="button">
                Add Image</button>
        </div>
        <div class="col-12">
            <span>Note: Empty images will be ignored</span>
        </div>
        <div id="vendor-images" class="col">
            <label for="image">Images</label>
            <input type="text" name="image" placeholder="Input image URL here">
        </div>
    </div>
    <hr>
    <!-- Submit -->
    <div class="row">
        <input type="submit" class="btn vendor-btn" value="Submit">
    </div>
</form>
