<hr class="hr3 review-hr">

<div id="reviews" class="review-section">
    <div class="flex width-100 flex-wrap">
        <div class="flex flex-column review-left">
            <div class="flex align-items-center flex-wrap">
                <h3>4.0 </h3>
                <div class="flex flex-nowrap">
                    <i class="review-star bi bi-star-fill"></i>
                    <i class="review-star bi bi-star"></i>
                    <i class="review-star bi bi-star"></i>
                    <i class="review-star bi bi-star"></i>
                    <i class="review-star bi bi-star"></i>
                </div>
            </div>
            <h4 class="">20 Reviews</h4>
        </div>
        <div class="flex flex-column review-right">
            {% for starNumber in range(5, 0, -1) %}
            <div class="review-ratings d-flex align-items-center">
                <span class="me-2">
                    {{ starNumber }} 
                    <i class="review-star review-star-sm bi bi-star-fill"></i>
                    20
                </span>
                <div class="progress flex-grow-1 h-90">
                    <div class="progress-bar bg-warning" role="progressbar" style="width:75%" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
