{% extends "base.html" %}
{% block title %}Payment {{ super() }}{% endblock %}

{% block content %}
<style>
    .paymentInformation{
        width: 40%;
    }
    .sbmt-btn{
        background-color: var(--purple-2);
    }
    .sbmt-btn:hover{
        background-color: var(--purple-1);
        color: white;
    }
</style>

<div class="paymentInformation container my-4 d-flex flex-column align-content-center">
        <h3>Payment Information</h3>
        <p>Enter your payment details to complete the purchase.</p>
        <form action="{{ url_for('checkout.payment') }}" method="post">
            <div class="form-group">
                <label for="cardNumber">
                    Card Number
                </label>
                <input 
                type="text" 
                class="form-control" 
                id="cardNumber" 
                name="card_number" 
                pattern="^(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|3(?:0[0-5]|[68][0-9])[0-9]{11}|6(?:011|5[0-9]{2})[0-9]{12}|(?:2131|1800|35\d{3})\d{11})$"
                required>
            </div>
            <div class="form-group">
                <label for="expiryDate">Expiry Date</label>
                <input type="text" class="form-control" id="expiryDate"  pattern="^(0[1-9]|1[0-2])\/?([0-9]{2})$"name="expiry_date" required>
            </div>
            <div class="form-group">
                <label for="cvv">CVV</label>
                <input type="text" class="form-control" id="cvv" name="cvv" pattern="^[0-9]{3,4}$" required>
            </div>
            <button type="submit" class="btn sbmt-btn my-4">Complete Purchase</button>
        </form>
    </div>
{% endblock %}
