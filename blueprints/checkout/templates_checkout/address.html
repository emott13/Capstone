{% extends "base.html" %}



{% block content %}
<div class="container" style="margin-top: 20px;">
    <h2>Enter Delivery Address</h2>
    <form method="POST" action="{{ url_for('checkout.address') }}">
        <div class="form-group">
            <label for="add1">Street 1</label>
            <input type="text" class="form-control" id="add1" name="add1" required>
        </div>
        <div class="form-group">
            <label for="add2">Street 2</label>
            <input type="text" class="form-control" id="add2" name="add2">
        </div>
        <div class="form-group">
            <label for="city">City</label>
            <input type="text" class="form-control" id="city" name="city" required>
        </div>
        <div class="form-group">
            <label for="state">State</label>
            <input type="text" class="form-control" id="state" name="state" required>
        </div>
        <div class="form-group">
            <label for="zip">Zip Code</label>
            <input type="text" class="form-control" id="zip" name="zip" required>
        </div>
        <div class="form-group">
            <label for="country">Country</label>
            <input type="text" class="form-control" id="country" name="country" required>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Save Address</button>
    </form>
</div>
{% endblock %}
